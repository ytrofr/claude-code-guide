title: Claude Code Guide
tagline: "Complete Setup & Best Practices for Claude Code"
description: "The complete guide to Claude Code. Opus 4.7, Sonnet 4.6, Haiku 4.5. 1M token context window. 27 hook events. 42 production-tested chapters across 6 topical Parts (Foundation, Workflow, Extension, Context Engineering, Advanced, Reference). Three install tiers. CC 2.1.121+ compatible."
url: "https://ytrofr.github.io"
baseurl: "/claude-code-guide"
theme: jekyll-theme-minimal
lang: en-US

# Author
author:
  name: ytrofr
  url: https://github.com/ytrofr

# Repository
repository: ytrofr/claude-code-guide

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# SEO - Twitter
twitter:
  username: ytrofr
  card: summary_large_image

# SEO - Social Links
social:
  name: Claude Code Guide
  links:
    - https://github.com/ytrofr/claude-code-guide

# SEO - Keywords (for meta tags)
keywords:
  - claude code
  - claude code tutorial
  - claude code setup
  - claude code hooks
  - claude code skills
  - claude code mcp
  - claude code agents
  - claude code plan mode
  - claude code 2.1.121
  - claude opus 4.7
  - claude opus 4.6
  - claude sonnet 4.6
  - claude haiku 4.5
  - 1m context window
  - install tiers
  - manifest driven installer
  - context engineering
  - claude code rules
  - claude code context governance
  - ai dna shared layer
  - inter-agent bus
  - anthropic cli
  - ai coding assistant
  - code automation
  - mcp integration
  - agentic coding

# Google verification (add your code if needed)
# google_site_verification: YOUR_CODE_HERE

# Default settings for all pages
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-image.svg
      layout: default
      author: ytrofr

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore
